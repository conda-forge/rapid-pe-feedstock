schema_version: 1

context:
  name: rapid-pe
  version: 0.1.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 733b283e7159801dd43c4ae7260f8f69b513940e9137516a2d282526f1de01d0

build:
  number: 2
  script: ${{ PYTHON }} -m pip install . -vv
  skip: win

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - bilby
    - h5py
    - healpy
    - lalsuite
    - ligo.skymap
    - lscsoft-glue
    - matplotlib-base
    - numpy
    - python
    - python-ligo-lw
    - scikit-learn
    - scipy
    - six

tests:
  - requirements:
      run:
        - pip
        - pytest
    script:
      # Check metadata
      - python -m pip check
      - python -m pip show rapid-pe
      # Run test suite
      - python -m pytest -v --pyargs rapid_pe
      # Check scripts
      - rapidpe_calculate_overlap --help
      - rapidpe_compute_intrinsic_fisher --help
      - rapidpe_compute_intrinsic_grid --help
      - rapidpe_create_event_dag --help
      - rapidpe_integrate_extrinsic_likelihood --help
      - rapidpe_triangulation --help

about:
  summary: "RapidPE: The original low-latency gravitational wave parameter estimation code."
  homepage: https://git.ligo.org/rapidpe-rift/rapidpe/
  license: GPL-2.0-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - dwysocki
    - vinaya-valsan
    - CaitlinRose
